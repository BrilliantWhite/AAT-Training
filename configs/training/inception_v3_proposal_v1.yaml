schema_version: aat-cnn-training-v1
backbone: inception_v3
pretrained: true
batch_size: 32
max_epochs: 60
patience: 8
amp: true
learning_rate: 0.0001
weight_decay: 0.0001
dropout: 0.2
loss: inverse_sqrt_weighted_ce
augmentations:
  rotation_degrees: 2
  crop_scale_min: 0.95
  vertical_flip: false
  mixup: false
